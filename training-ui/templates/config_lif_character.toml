# LIF Character LoRA — based on official author guidance (Anima model card: rank 32, LR 2e-5,
# don't train the LLM adapter) plus community consensus (~1500 steps sweet spot, save often and
# pick the best checkpoint; 3000+ steps overfits and dilutes base styles).
# Usage: copy this file to a job's config.toml, or load via the UI then paste values.

[training_arguments]
output_name = "my_anima_character_lora"
save_model_as = "safetensors"
max_train_epochs = 16
save_every_n_epochs = 1
log_with = "tensorboard"
# 2e-5 at effective batch 4 (grad accum). If underfitting, raise toward 5e-5;
# burned-looking samples mean it was too high.
learning_rate = 2e-5
optimizer_type = "AdamW8bit"
optimizer_args = [ "betas=0.9,0.99", "weight_decay=0.01", "eps=1e-8",]
lr_scheduler = "constant_with_warmup"
lr_warmup_steps = 100
max_grad_norm = 1.0
mixed_precision = "bf16"
gradient_checkpointing = true
gradient_accumulation_steps = 4
flash_attn = false
torch_compile = false
max_data_loader_n_workers = 4
persistent_data_loader_workers = true
seed = 42
cache_latents_to_disk = true
cache_text_encoder_outputs_to_disk = true
sample_every_n_epochs = 1
vae_chunk_size = 64
vae_disable_cache = true

[network_arguments]
network_module = "networks.lora_anima"
network_dim = 32
network_alpha = 32
network_train_unet_only = true

[anima_arguments]
timestep_sample_method = "logit_normal"
discrete_flow_shift = 1.0
sigmoid_scale = 1.3
